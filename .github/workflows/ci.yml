name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-and-evaluate:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Train Model
      run: |
        python src/train.py

    - name: Evaluate Model
      run: |
        python src/evaluate.py